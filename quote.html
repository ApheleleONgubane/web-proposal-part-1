    <h1>Request a Quote</h1>

 <form id="quoteForm">>
    <label>Name:</label><br> 
    <input type="text" name ="fullname" placeholder="Ann Pretty" required><br><br>

<label>Surname:</label><br>
    <input type="text" surname="surname" placeholder="Jones" required><br><br>

    <label>Email:</label><br>
    <input type="email" email="email Address" placeholder="aphelum@g.mail"><br><br>

<label>Cellphone Number</label>
    <input type="tel" name="cellphone" placeholder="0835902227" pattern="[0-9]{10}" required><br><br>


    <label>Project Details:</label><br>
<textarea rows="5" cols="40" name="project_details" 
placeholder="Tell us about your project:
- Type (windows, doors, etc.)
- Size or measurements
- Location
- Any special requirements"
required></textarea><br><br>

<input type="submit" value="Submit">
